<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Axios Practice</title>
</head>
<body>

  <h1>Mini Posts App</h1>

  <!-- Button to fetch posts -->
  <button id="loadPosts">Load Posts</button>

  <!-- Form to add post -->
  <h2>Add Post</h2>
  <input type="text" id="title" placeholder="Title" />
  <input type="text" id="body" placeholder="Body" />
  <button id="addPost">Add Post</button>

  <!-- Status -->
  <p id="status"></p>

  <!-- Posts container -->
  <ul id="postsList"></ul>

  <!-- Axios CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- JS File -->
  <script src="script.js"></script>

</body>
</html>
